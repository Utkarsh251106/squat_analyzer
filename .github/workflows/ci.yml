name: CI — Squat Analyzer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --max-line-length=100 --exclude=__pycache__,venv --statistics

      - name: Check all modules import correctly
        run: |
          python -c "from rules import check_back_angle, check_knee_over_toe, check_hip_depth, is_in_squat_position; print('rules.py OK')"
          python -c "from feedback import generate_feedback; print('feedback.py OK')"
          python -c "from counter import SquatCounter; print('counter.py OK')"
          python -c "from pose_estimator import PoseEstimator; print('pose_estimator.py OK')"
          python -c "from analyzer import analyze_frame; print('analyzer.py OK')"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short
        continue-on-error: true